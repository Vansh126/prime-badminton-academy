[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "18"
CI = "true"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/dist/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
